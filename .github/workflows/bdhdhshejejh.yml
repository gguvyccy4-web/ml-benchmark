name: Visual Regression Suite

on:
  workflow_dispatch:

jobs:
  visual-test:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq xvfb
          
          # Install npm packages in repo directory
          npm init -y
          npm install express ws
          
          echo "[SETUP] Dependencies ready"

      - name: Run visual regression dashboard
        run: |
          export DISPLAY=:99
          Xvfb :99 -screen 0 1280x720x24 &
          sleep 1
          
          # Write bridge to repo directory (where node_modules lives)
          cat > bridge.js << 'BRIDGEEOF'
          const express = require('express');
          const { spawn } = require('child_process');
          const WebSocket = require('ws');
          const http = require('http');
          const app = express();
          const PORT = 8080;
          
          let chrome = null;
          let cdpWs = null;
          let latestScreenshot = null;
          
          const html = `<!DOCTYPE html>
          <html><head>
          <meta charset="UTF-8">
          <meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no,maximum-scale=1.0">
          <title>Visual Dashboard</title>
          <style>
          *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
          body{background:#0d1117;overflow:hidden;height:100vh;touch-action:manipulation;position:fixed;top:0;left:0;right:0;bottom:0;}
          #screen{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:contain;pointer-events:none;}
          #touch{position:absolute;top:0;left:0;width:100%;height:100%;z-index:10;}
          #cursor{position:absolute;width:18px;height:18px;border-radius:50%;background:rgba(255,60,60,0.9);border:2px solid #fff;display:none;z-index:11;transform:translate(-50%,-50%);pointer-events:none;}
          #ch{position:absolute;height:1px;background:rgba(255,60,60,0.5);left:0;right:0;display:none;z-index:9;}
          #cv{position:absolute;width:1px;background:rgba(255,60,60,0.5);top:0;bottom:0;display:none;z-index:9;}
          #bar{position:fixed;bottom:10px;left:50%;transform:translateX(-50%);display:flex;gap:5px;background:rgba(22,27,34,0.95);padding:7px 10px;border-radius:20px;border:1px solid #30363d;z-index:20;flex-wrap:wrap;}
          .bt{background:#21262d;color:#c9d1d9;border:1px solid #30363d;padding:9px 11px;border-radius:13px;font-size:11px;cursor:pointer;touch-action:manipulation;}
          .bt:active{background:#3fb950;color:#000;}
          #inp{position:fixed;bottom:75px;left:50%;transform:translateX(-50%);display:none;z-index:20;}
          #inp input{background:#161b22;border:1px solid #30363d;color:#c9d1d9;padding:8px 14px;border-radius:16px;font-size:14px;width:60vw;outline:none;}
          #st{position:fixed;top:8px;right:8px;color:#3fb950;font-size:10px;font-family:monospace;background:rgba(0,0,0,0.85);padding:4px 10px;border-radius:12px;z-index:20;pointer-events:none;}
          </style></head><body>
          <img id="screen" src="/shot" />
          <div id="touch"></div>
          <div id="cursor"></div><div id="ch"></div><div id="cv"></div>
          <div id="st">CONNECTING</div>
          <div id="bar">
            <button class="bt" id="bw">Win</button>
            <button class="bt" id="be">Esc</button>
            <button class="bt" id="bt">Tab</button>
            <button class="bt" id="br">Ent</button>
            <button class="bt" id="bk">Type</button>
            <button class="bt" id="bu">URL</button>
          </div>
          <div id="inp"><input id="ki" placeholder="Type then Enter" /></div>
          <script>
          var img=document.getElementById('screen'),st=document.getElementById('st'),
          cd=document.getElementById('cursor'),ch=document.getElementById('ch'),cv=document.getElementById('cv'),
          tl=document.getElementById('touch'),iw=1280,ih=720,ts=null,drag=false,lt=0,lp=null;
          
          function refresh(){img.src='/shot?t='+Date.now();}
          function send(d){fetch('/in',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(d)}).catch(function(){})}
          function gc(e){var r=img.getBoundingClientRect(),cx=e.touches?e.touches[0].clientX:e.clientX,cy=e.touches?e.touches[0].clientY:e.clientY;return{rx:Math.round((cx-r.left)*(iw/r.width)),ry:Math.round((cy-r.top)*(ih/r.height)),dx:cx-r.left,dy:cy-r.top}}
          function sc(x,y){cd.style.display='block';ch.style.display='block';cv.style.display='block';cd.style.left=x+'px';cd.style.top=y+'px';ch.style.top=y+'px';cv.style.left=x+'px'}
          
          tl.addEventListener('touchstart',function(e){e.preventDefault();
            var c=gc(e);sc(c.dx,c.dy-45);send({t:'move',x:c.rx,y:c.ry});ts=c;drag=false;
            clearTimeout(lp);lp=setTimeout(function(){if(!drag&&ts)send({t:'rclick',x:ts.rx,y:ts.ry})},400);
          },{passive:false});
          tl.addEventListener('touchmove',function(e){e.preventDefault();
            if(!ts)return;var c=gc(e);sc(c.dx,c.dy-45);send({t:'move',x:c.rx,y:c.ry});
          },{passive:false});
          tl.addEventListener('touchend',function(e){e.preventDefault();clearTimeout(lp);
            if(!ts)return;if(!drag){var n=Date.now(),c=ts;
            if(n-lt<300){send({t:'dblclick',x:c.rx,y:c.ry});lt=0}else{send({t:'click',x:c.rx,y:c.ry});lt=n}}
            ts=null;drag=false;setTimeout(refresh,150);
          },{passive:false});
          
          function bk(id,k){document.getElementById(id).addEventListener('touchend',function(e){e.preventDefault();send({t:'key',k:k})})}
          bk('bw','Meta');bk('be','Escape');bk('bt','Tab');bk('br','Enter');
          document.getElementById('bk').addEventListener('touchend',function(e){e.preventDefault();var x=document.getElementById('inp');x.style.display=x.style.display==='block'?'none':'block';if(x.style.display==='block')document.getElementById('ki').focus()});
          document.getElementById('ki').addEventListener('keydown',function(e){if(e.key==='Enter'){e.preventDefault();send({t:'type',v:this.value});this.value='';document.getElementById('inp').style.display='none'}});
          document.getElementById('bu').addEventListener('touchend',function(e){e.preventDefault();var u=prompt('URL:');if(u){if(!u.startsWith('http'))u='https://'+u;send({t:'navigate',url:u})}});
          
          setInterval(refresh,200);
          </script></body></html>`;
          
          async function startChrome() {
            // Use Playwright's downloaded Chromium
            const chromiumPath = require('child_process').execSync('npx playwright install chromium --dry-run 2>/dev/null || echo /home/runner/.cache/ms-playwright/chromium-*/chrome-linux64/chrome', {encoding:'utf8'}).trim().split('\n').pop();
            const chromeBin = '/home/runner/.cache/ms-playwright/chromium-*/chrome-linux64/chrome';
            
            chrome = spawn('chromium', [
              '--remote-debugging-port=9222',
              '--no-first-run',
              '--no-default-browser-check',
              '--disable-gpu',
              '--disable-extensions',
              '--window-size=1280,720',
              '--window-position=0,0',
              '--no-sandbox',
              'about:blank'
            ], {
              env: { ...process.env, DISPLAY: ':99' },
              stdio: ['ignore', 'pipe', 'pipe']
            });
            
            await new Promise(resolve => setTimeout(resolve, 4000));
            
            // Connect to DevTools
            const resp = await new Promise((resolve, reject) => {
              http.get('http://127.0.0.1:9222/json', (res) => {
                let data = '';
                res.on('data', c => data += c);
                res.on('end', () => resolve(JSON.parse(data)));
              }).on('error', reject);
            });
            
            if (resp[0]?.webSocketDebuggerUrl) {
              cdpWs = new WebSocket(resp[0].webSocketDebuggerUrl);
              cdpWs.on('open', () => {
                console.log('[CDP] Connected to Chrome');
                cdpWs.send(JSON.stringify({ id: 1, method: 'Page.enable' }));
              });
            }
          }
          
          function cdpSend(method, params) {
            if (cdpWs?.readyState === 1) {
              cdpWs.send(JSON.stringify({ id: Date.now(), method, params }));
            }
          }
          
          // Screenshot loop
          setInterval(() => {
            if (cdpWs?.readyState === 1) {
              cdpWs.once('message', (data) => {
                try {
                  const msg = JSON.parse(data);
                  if (msg.result?.data) {
                    latestScreenshot = Buffer.from(msg.result.data, 'base64');
                  }
                } catch (e) {}
              });
              cdpWs.send(JSON.stringify({ id: Date.now(), method: 'Page.captureScreenshot', params: { format: 'jpeg', quality: 70 } }));
            }
          }, 200);
          
          app.get('/', (req, res) => res.send(html));
          app.get('/shot', (req, res) => {
            if (latestScreenshot) {
              res.set('Content-Type', 'image/jpeg');
              res.set('Cache-Control', 'no-cache');
              res.send(latestScreenshot);
            } else {
              res.status(204).end();
            }
          });
          app.get('/ping', (req, res) => res.send('ok'));
          app.use(express.json());
          app.post('/in', (req, res) => {
            const { t, x, y, k, v, url } = req.body;
            if (t === 'move') {
              cdpSend('Input.dispatchMouseEvent', { type: 'mouseMoved', x, y });
            } else if (t === 'click') {
              cdpSend('Input.dispatchMouseEvent', { type: 'mousePressed', x, y, button: 'left', clickCount: 1 });
              setTimeout(() => cdpSend('Input.dispatchMouseEvent', { type: 'mouseReleased', x, y, button: 'left', clickCount: 1 }), 50);
            } else if (t === 'dblclick') {
              cdpSend('Input.dispatchMouseEvent', { type: 'mousePressed', x, y, button: 'left', clickCount: 2 });
              setTimeout(() => cdpSend('Input.dispatchMouseEvent', { type: 'mouseReleased', x, y, button: 'left', clickCount: 2 }), 50);
            } else if (t === 'rclick') {
              cdpSend('Input.dispatchMouseEvent', { type: 'mousePressed', x, y, button: 'right', clickCount: 1 });
              setTimeout(() => cdpSend('Input.dispatchMouseEvent', { type: 'mouseReleased', x, y, button: 'right', clickCount: 1 }), 50);
            } else if (t === 'key') {
              const keyMap = { Meta: 'Meta', Escape: 'Escape', Tab: 'Tab', Enter: 'Enter', Backspace: 'Backspace', Space: ' ' };
              const key = keyMap[k] || k;
              cdpSend('Input.dispatchKeyEvent', { type: 'keyDown', key });
              setTimeout(() => cdpSend('Input.dispatchKeyEvent', { type: 'keyUp', key }), 50);
            } else if (t === 'type') {
              for (const ch of v) cdpSend('Input.dispatchKeyEvent', { type: 'char', text: ch });
            } else if (t === 'navigate') {
              cdpSend('Page.navigate', { url });
            }
            res.json({ ok: true });
          });
          
          app.listen(PORT, '127.0.0.1', async () => {
            console.log('Server on :' + PORT);
            await startChrome();
          });
          BRIDGEEOF
          
          # Start the bridge
          node bridge.js &
          sleep 5
          
          # Verify server is actually running
          if curl -s http://127.0.0.1:8080/ping | grep -q ok; then
            echo "[OK] Bridge server alive"
          else
            echo "[FAIL] Bridge server not responding"
            exit 1
          fi
          
          # Download and start bore
          curl -sL https://github.com/ekzhang/bore/releases/download/v0.5.2/bore-v0.5.2-x86_64-unknown-linux-musl.tar.gz | tar xz
          chmod +x bore
          
          ./bore local 8080 --to bore.pub > /tmp/bore.log 2>&1 &
          sleep 5
          
          PORT=$(grep -oP 'listening at bore\.pub:\K\d+' /tmp/bore.log | head -1)
          
          if [ -z "$PORT" ]; then
            echo "[FAIL] Bore failed to get port"
            cat /tmp/bore.log
            exit 1
          fi
          
          echo ""
          echo "=============================================="
          echo " OPEN: http://bore.pub:$PORT"
          echo "=============================================="
          
          while true; do
            sleep 60
            echo "[ALIVE] $(date) - bore.pub:$PORT"
          done
        shell: bash
